<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador (Vibecodado) do Início da Copa</title>
<meta name="description" content="Contagem regressiva para a Copa 2026 e jogos do Brasil">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>

<header>
  <h1>⚽ Contador (Vibecodado) do Início da Copa</h1>
  <p>Copa do Mundo 2026 • Atualização em tempo real</p>
</header>

<main>
<section class="hero">
  <h2>Jogo de Abertura</h2>
  <p>México 🇲🇽 x 🇿🇦 África do Sul</p>

  <div class="countdown">
    <div class="box"><span id="days">0</span><small>Dias</small></div>
    <div class="box"><span id="hours">0</span><small>Horas</small></div>
    <div class="box"><span id="minutes">0</span><small>Minutos</small></div>
    <div class="box"><span id="seconds">0</span><small>Segundos</small></div>
  </div>
</section>

<section class="brazil">
<h2>🇧🇷 Caminho do Brasil</h2>

<div class="match">
<h3>🇧🇷 Brasil x 🇲🇦 Marrocos</h3>
<p id="br1"></p>
</div>

<div class="match">
<h3>🇧🇷 Brasil x 🇭🇹 Haiti</h3>
<p id="br2"></p>
</div>

<div class="match">
<h3>🏴 Escócia x 🇧🇷 Brasil</h3>
<p id="br3"></p>
</div>
</section>
</main>

<footer>V2 • Otimizado para celular</footer>

<script src="script.js"></script>
</body>
</html>
